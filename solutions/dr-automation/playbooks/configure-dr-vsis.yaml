---
##############################################################################
# DR VSI Configuration Playbook
# Installs and configures: ArgoCD, Ansible agent, DR health check scripts
# Triggered post-Terraform deploy via IBM Cloud Projects
##############################################################################

- name: Configure DR VSIs with GitOps toolchain
  hosts: dr_vsis
  become: true
  vars:
    argocd_version: "v2.10.0"
    argocd_namespace: "argocd"
    dr_scripts_dir: /opt/dr-automation
    health_check_interval: "{{ rpo_minutes | default(15) }}"

  tasks:

    - name: Update system packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - jq
          - python3-pip
          - unzip
          - net-tools
        state: present

    - name: Install IBM Cloud CLI
      ansible.builtin.shell: |
        curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
      args:
        creates: /usr/local/bin/ibmcloud

    - name: Install IBM Cloud VPC plugin
      ansible.builtin.command: ibmcloud plugin install vpc-infrastructure -f
      changed_when: true

    - name: Install Terraform
      ansible.builtin.unarchive:
        src: "https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip"
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"
        creates: /usr/local/bin/terraform

    - name: Create DR automation scripts directory
      ansible.builtin.file:
        path: "{{ dr_scripts_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy DR failover script
      ansible.builtin.copy:
        src: dr-failover.sh
        dest: "{{ dr_scripts_dir }}/dr-failover.sh"
        mode: "0755"

    - name: Deploy DR health check script
      ansible.builtin.copy:
        src: dr-health-check.sh
        dest: "{{ dr_scripts_dir }}/dr-health-check.sh"
        mode: "0755"

    - name: Install ArgoCD CLI
      ansible.builtin.shell: |
        curl -sSL -o /usr/local/bin/argocd \
          https://github.com/argoproj/argo-cd/releases/download/{{ argocd_version }}/argocd-linux-amd64
        chmod +x /usr/local/bin/argocd
      args:
        creates: /usr/local/bin/argocd

    - name: Configure DR health check cron job
      ansible.builtin.cron:
        name: "DR health check"
        minute: "*/{{ health_check_interval }}"
        job: "{{ dr_scripts_dir }}/dr-health-check.sh >> /var/log/dr-health.log 2>&1"
        state: present

    - name: Create DR status tracking file
      ansible.builtin.copy:
        content: |
          {
            "status": "standby",
            "last_check": "{{ ansible_date_time.iso8601 }}",
            "primary_region": "{{ primary_region | default('us-south') }}",
            "dr_region": "{{ dr_region | default('us-east') }}"
          }
        dest: "{{ dr_scripts_dir }}/dr-status.json"
        mode: "0644"

    - name: Enable and start DR health check service
      ansible.builtin.systemd:
        name: cron
        enabled: true
        state: started
